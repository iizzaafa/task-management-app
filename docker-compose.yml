version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: task-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: taskdb
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

  backend:
    build: ./backend
    container_name: task-backend
    restart: always
    ports:
      - "5001:5000"
    environment:
      DATABASE_URL: mysql+pymysql://root:password@db:3306/taskdb
      SECRET_KEY: change-me-in-prod
      JWT_SECRET_KEY: jwt-secret-change-in-prod
      ADMIN_EMAIL: admin@admin.com
      ADMIN_PASSWORD: Admin@123
    depends_on:
      - db
    networks:
      - app-network

  frontend:
    build: ./frontend
    container_name: task-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge